name: b012_data
description: A very easy to use Flutter package to build, generate and manipulate data. It provides easy SQLite persistence and file-system helpers for Android, iOS, Linux, macOS and Windows.
version: 2.0.0
homepage: https://birane012.github.io
repository: https://github.com/birane012/b012_data.git

# Supported platforms
platforms:
  android:
  ios:
  linux:
  macos:
  windows:

environment:
  sdk: ">=2.12.0 <4.0.0"
  flutter: ">=2.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ">=2.0.0 <3.0.0"
  sqflite_common_ffi: ">=2.0.0 <3.0.0"
  path_provider: ">=2.0.0 <3.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=1.0.0 <7.0.0"
